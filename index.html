<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 提示詞小幫手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // 設定客製化顏色以貼近原圖風格
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-dark': '#0f172a',
                        'card-bg': '#1e293b',
                        'accent-blue': '#38bdf8',
                        'accent-yellow': '#fbbf24'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-dark text-slate-300 font-sans p-8">

    <header class="mb-10 flex items-center gap-4 border-b border-slate-700 pb-4">
        <div class="w-12 h-12 bg-accent-yellow rounded-full flex items-center justify-center text-brand-dark font-bold text-xl">AI</div>
        <div>
            <h1 class="text-2xl font-bold text-white flex items-center gap-2">
                校務/導師小幫手 
                <span class="text-sm px-2 py-1 bg-slate-800 text-accent-blue rounded-full border border-slate-700">火力支援</span>
            </h1>
            <p class="text-sm text-slate-400 mt-1">為您提供全方位的實戰提示詞</p>
        </div>
    </header>

    <main class="max-w-5xl mx-auto space-y-6">
        
        <div class="bg-card-bg rounded-xl border border-slate-700 p-6 flex flex-col md:flex-row gap-8">
            
            <div class="md:w-1/3 space-y-4">
                <span class="text-accent-blue text-sm font-bold tracking-wider">第 1-2 週</span>
                <h2 class="text-xl font-bold text-accent-yellow">常規建立與資料調查</h2>
                <p class="text-sm text-slate-400 leading-relaxed">建立班級常規、處理午餐/教科書/弱勢補助申請、IEP個案會議準備。</p>
                <div class="inline-block text-xs text-accent-yellow border border-accent-yellow/50 bg-accent-yellow/10 px-3 py-1 rounded">
                    ⚠️ 全學年：特教生觀察與輔導計畫
                </div>
            </div>

            <div class="md:w-2/3">
                <p class="text-sm text-slate-400 mb-3">實戰 AI 提示詞清單：</p>
                <div class="space-y-3">
                    
                    <button onclick="copyPrompt('請扮演一位具備20年經驗的國小高年級導師，幫我擬定一份「班級常規建立清單」，需包含獎懲機制與具體執行步驟，語氣要溫和但堅定。')" 
                            class="w-full text-left bg-slate-800 hover:bg-slate-700 border border-slate-600 rounded-lg p-4 flex items-center justify-between transition-colors group">
                        <div class="flex items-center gap-3">
                            <span class="text-slate-400 group-hover:text-white">💬</span>
                            <span class="text-slate-200">班級常規建立清單</span>
                        </div>
                        <span class="text-slate-500 group-hover:text-white">›</span>
                    </button>

                    <button onclick="copyPrompt('請幫我撰寫一封發給學生家長的「弱勢補助申請通知信」。語氣需委婉、清晰，並列出家長需要準備的證明文件列表。')" 
                            class="w-full text-left bg-slate-800 hover:bg-slate-700 border border-slate-600 rounded-lg p-4 flex items-center justify-between transition-colors group">
                        <div class="flex items-center gap-3">
                            <span class="text-slate-400 group-hover:text-white">💬</span>
                            <span class="text-slate-200">弱勢補助申請通知信</span>
                        </div>
                        <span class="text-slate-500 group-hover:text-white">›</span>
                    </button>

                </div>
            </div>
        </div>

    </main>

    <div id="toast" class="fixed bottom-5 right-5 bg-green-500 text-white px-6 py-3 rounded shadow-lg transform transition-transform duration-300 translate-y-20 opacity-0">
        提示詞已複製到剪貼簿！請直接貼上給 AI。
    </div>

    <script>
        function copyPrompt(text) {
            // 執行複製動作
            navigator.clipboard.writeText(text).then(() => {
                // 顯示成功提示
                const toast = document.getElementById('toast');
                toast.classList.remove('translate-y-20', 'opacity-0');
                
                // 3秒後自動隱藏
                setTimeout(() => {
                    toast.classList.add('translate-y-20', 'opacity-0');
                }, 3000);
            }).catch(err => {
                console.error('複製失敗:', err);
                alert('複製失敗，請手動複製。');
            });
        }
    </script>
</body>
</html>
