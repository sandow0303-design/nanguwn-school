<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 提示詞小幫手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-dark': '#0f172a',
                        'card-bg': '#1e293b',
                        'accent-blue': '#38bdf8',
                        'accent-cyan': '#06b6d4',
                        'accent-yellow': '#fbbf24'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-dark text-slate-300 font-sans p-8 relative min-h-screen">

    <header class="mb-10 flex items-center gap-4 border-b border-slate-700 pb-4">
        <div class="w-12 h-12 bg-accent-yellow rounded-full flex items-center justify-center text-brand-dark font-bold text-xl">AI</div>
        <div>
            <h1 class="text-2xl font-bold text-white flex items-center gap-2">
                校務/導師小幫手 
                <span class="text-sm px-2 py-1 bg-slate-800 text-accent-blue rounded-full border border-slate-700">火力支援</span>
            </h1>
            <p class="text-sm text-slate-400 mt-1">為您提供全方位的實戰提示詞</p>
        </div>
    </header>

    <main class="max-w-5xl mx-auto space-y-6">
        <div class="bg-card-bg rounded-xl border border-slate-700 p-6 flex flex-col md:flex-row gap-8">
            <div class="md:w-1/3 space-y-4">
                <span class="text-accent-blue text-sm font-bold tracking-wider">第 1-2 週</span>
                <h2 class="text-xl font-bold text-accent-yellow">常規建立與資料調查</h2>
                <p class="text-sm text-slate-400 leading-relaxed">建立班級常規、處理午餐/教科書/弱勢補助申請、IEP個案會議準備。</p>
            </div>

            <div class="md:w-2/3">
                <p class="text-sm text-slate-400 mb-3">實戰 AI 提示詞清單：</p>
                <div class="space-y-3">
                    
                    <button onclick="openModal('班級常規建立清單', '請幫我列國小[低/中/高]年級的「班級常規檢查清單」，分為：早自修、上課中、下課時、打掃時間 四個階段。要求具體、可執行，例如「桌墊下不塞垃圾」。')" 
                            class="w-full text-left bg-slate-800 hover:bg-slate-700 border border-slate-600 rounded-lg p-4 flex items-center justify-between transition-colors group">
                        <div class="flex items-center gap-3">
                            <span class="text-slate-400 group-hover:text-white">💬</span>
                            <span class="text-slate-200">班級常規建立清單</span>
                        </div>
                        <span class="text-slate-500 group-hover:text-white">›</span>
                    </button>

                    <button onclick="openModal('弱勢補助申請通知信', '請幫我撰寫一封發給學生家長的「弱勢補助申請通知信」。語氣需委婉、清晰，並列出家長需要準備的證明文件列表。')" 
                            class="w-full text-left bg-slate-800 hover:bg-slate-700 border border-slate-600 rounded-lg p-4 flex items-center justify-between transition-colors group">
                        <div class="flex items-center gap-3">
                            <span class="text-slate-400 group-hover:text-white">💬</span>
                            <span class="text-slate-200">弱勢補助申請通知信</span>
                        </div>
                        <span class="text-slate-500 group-hover:text-white">›</span>
                    </button>

                </div>
            </div>
        </div>
    </main>

    <div id="promptModal" class="fixed inset-0 bg-black/70 hidden flex items-center justify-center z-50">
        <div class="bg-card-bg border border-slate-600 rounded-xl w-full max-w-2xl shadow-2xl overflow-hidden mx-4">
            
            <div class="flex justify-between items-center p-4 border-b border-slate-700 bg-slate-800/50">
                <h3 id="modalTitle" class="text-accent-yellow font-bold flex items-center gap-2">
                    <span class="text-accent-blue">✍️</span> 標題
                </h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-white text-xl leading-none">&times;</button>
            </div>
            
            <div class="p-6">
                <p class="text-sm text-slate-400 mb-3">請確認或修改下方的提示詞，加入您班上的實際狀況：</p>
                <textarea id="modalTextarea" class="w-full h-40 bg-brand-dark text-slate-300 p-4 rounded-lg border border-slate-700 focus:border-accent-blue focus:outline-none resize-none leading-relaxed"></textarea>
            </div>
            
            <div class="p-4 border-t border-slate-700 bg-slate-800/50 flex justify-between items-center">
                <div class="text-xs text-slate-500 flex items-center gap-2">
                    💡 建議：複製後，貼到您慣用的 AI 中執行。
                </div>
                <div class="flex gap-3">
                    <button onclick="closeModal()" class="px-4 py-2 rounded-lg border border-slate-600 text-slate-300 hover:bg-slate-700 transition text-sm">取消</button>
                    <button onclick="copyFromModal()" class="px-4 py-2 rounded-lg bg-accent-cyan hover:bg-cyan-400 text-white font-bold transition flex items-center gap-2 text-sm shadow-lg shadow-cyan-500/20">
                        <span>📋</span> 複製提示詞
                    </button>
                </div>
            </div>

        </div>
    </div>

    <div id="toast" class="fixed bottom-5 right-5 bg-green-500 text-white px-6 py-3 rounded shadow-lg transform transition-transform duration-300 translate-y-20 opacity-0 z-50">
        提示詞已複製到剪貼簿！
    </div>

    <script>
        const modal = document.getElementById('promptModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalTextarea = document.getElementById('modalTextarea');

        // 打開彈窗並載入資料
        function openModal(title, text) {
            modalTitle.innerHTML = `<span class="text-accent-blue">✍️</span> ${title}`;
            modalTextarea.value = text;
            modal.classList.remove('hidden'); // 移除隱藏狀態
        }

        // 關閉彈窗
        function closeModal() {
            modal.classList.add('hidden'); // 加入隱藏狀態
        }

        // 從彈窗中複製修改後的文字
        function copyFromModal() {
            const currentText = modalTextarea.value;
            
            navigator.clipboard.writeText(currentText).then(() => {
                closeModal(); // 複製成功後關閉彈窗
                
                // 顯示成功提示
                const toast = document.getElementById('toast');
                toast.classList.remove('translate-y-20', 'opacity-0');
                
                setTimeout(() => {
                    toast.classList.add('translate-y-20', 'opacity-0');
                }, 3000);
            }).catch(err => {
                console.error('複製失敗:', err);
                alert('複製失敗，請檢查瀏覽器權限。');
            });
        }
    </script>
</body>
</html>
